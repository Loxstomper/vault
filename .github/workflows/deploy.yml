# Continuous deployment for the vault demo.
#
# Fires when the harness pushes a verified, merged commit to `main` (see the harness
# project's demo/vault/run.sh). Builds a single static binary and ships it to the VPS.
#
# The app is self-contained: pure-Go SQLite (modernc.org/sqlite, no cgo), templ views
# compiled into the binary, and static assets embedded via //go:embed — so a lone
# `CGO_ENABLED=0` linux/amd64 binary needs no Go toolchain, git, or asset files on the VPS.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     — the VPS hostname or IP
#   VPS_USER     — the SSH user (must be able to `sudo install`/`systemctl restart vault`)
#   VPS_SSH_KEY  — a private SSH key whose public half is in the VPS user's authorized_keys
#
# The VPS runs the binary as a systemd service named `vault`, bound to loopback behind a
# TLS-terminating reverse proxy (e.g. Caddy). A sample unit:
#   # /etc/systemd/system/vault.service
#   [Service]
#   Environment=VAULT_ADDR=127.0.0.1:8000
#   Environment=VAULT_DB=/var/lib/vault/vault.db
#   ExecStart=/usr/local/bin/vault
#   Restart=on-failure
#   [Install]
#   WantedBy=multi-user.target

name: deploy
on:
  push:
    branches: [main]
    # Only deploy when something that actually affects the binary changes. The harness lands
    # each feature as the candidate's own content commit PLUS a machine-authored integrate
    # commit that carries the provenance trailer but an empty diff (the content already landed
    # on the candidate). A push of only that empty commit — or a specs-/docs-only change —
    # touches none of these paths, so it no longer triggers a no-op build+deploy. The binary is
    # built from cmd/ + internal/ (Go sources, compiled *_templ.go, and the //go:embed'd
    # static assets all live here) and the module files; nothing else feeds it.
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'

# Serialize deploys; a newer push supersedes one already running.
concurrency:
  group: deploy-vault
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build static binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o vault ./cmd/vault
      - name: Copy binary to the VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: vault
          target: /tmp/vault-deploy
      - name: Install and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            sudo install -m 0755 /tmp/vault-deploy/vault /usr/local/bin/vault
            sudo systemctl restart vault
            rm -rf /tmp/vault-deploy
